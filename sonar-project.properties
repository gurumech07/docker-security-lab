# Required metadata
sonar.projectKey=gurumech07_docker-security-lab
sonar.organization=gurumech07
sonar.host.url=https://sonarcloud.io
sonar.verbose=true

# Path to source directory
sonar.sources=.

# Exclusions
sonar.exclusions=**/tests/**, **/Dockerfile.std

# Language-specific
sonar.python.version=3.11
sonar.python.coverage.reportPaths=coverage.xml
sonar.tests=tests

# Encoding
sonar.sourceEncoding=UTF-8
